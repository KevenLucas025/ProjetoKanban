<!DOCTYPE html>
<html lang="pt-br">
{% load static %}


<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Kanban{% endblock %}</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        *{
            font-family: Arial, Helvetica, sans-serif;
        }
        body{
            background: linear-gradient(135deg, #0f172a, #1e293b, #334155);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .tela-login{
            background: linear-gradient(135deg, #ffffff, #e5e7eb);
            color: black;
            border-radius: 12px;
            text-align: center;
            padding: 50px;
            width: 500px;
            margin: 130px auto;
            box-shadow:0 20px 50px rgba(0,0,0,0.25);
        }
        .tela-login h1{
            font-size:32px;
            margin-bottom:10px;
            color:#111827;
        }
        .tela-login p{
            color:#6b7280;
            margin-bottom:25px;
        }
        input{
            width: 70%;
            padding:14px;
            margin-bottom:15px;
            border:1px solid #d1d5db;
            border-radius:10px;
            outline:none;
            font-size:15px;
        }
        input:focus{
            border-color: #2563eb;
        }
        button{
            display:block;
            width:70%;
            margin:0 auto;
            padding:14px;
            border:none;
            border-radius:10px;
            background:#2563eb;
            color:white;
            font-size:16px;
            cursor:pointer;
            transition:0.3s;
        }
        button:hover{
            background:#1d4eb8
        }
        a{
            display:block;
            margin-top:18px;
            text-decoration:none;
            color:#2563eb;
            font-size:14px;
        }
        .alerta{
            color:white;
            padding:12px;
            border-radius:8px;
            margin-bottom:15px;
            font-size:14px;
        }

        /* erro */
        .alerta.error{
            background:#ef4444;
        }

        /* sucesso */
        .alerta.success{
            background:#22c55e;
        }
        .erro-input{
            border: 2px solid #ef4444 !important;
            background: #fef2f2;
        }
        .erro-input:focus{
            outline:none;
            border-color:#dc2626;
        }
        .btn-login{
            display: block;
            width: 70%;
            background:#22c55e;
            color:white;
            padding:14px;
            border-radius:10px;
            font-size:14px;
            transition:.3s;
            text-align:center;
            margin:18px auto 0 auto;
        }

        .btn-login:hover{
            background:#16a34a;
        }
        .dashboard{
            width: 95%;
            margin: 30px auto;
        }

        .topbar{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:30px;
            color:white;
        }

        .user-area{
            display:flex;
            gap:15px;
            align-items:center;
        }

        .btn-sair{
            background:#ef4444;
            color:white;
            padding:10px 16px;
            border-radius:8px;
            text-decoration:none;
        }

        html, body{
            margin: 0;
            padding: 0;
            min-height: 100%;
            overflow-x: auto;   /* scroll horizontal da página */
            overflow-y: auto;
        }

        body{
            background: linear-gradient(135deg, #0f172a, #1e293b, #334155);
        }

        /* Topo */
        .topbar{
            margin-bottom: 30px;
            color: white;
        }

        .topbar h1{
            font-size: 42px;
            margin: 0;
        }

        /* Colunas */
        .board{
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }

        /* Card da coluna */
        .coluna{
            width: 280px;
            min-height: 650px;
            background: #f8fafc;
            border-radius: 14px;
            padding: 20px;
            flex-shrink: 0;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }

        .coluna h2{
            margin-top: 0;
            margin-bottom: 18px;
            font-size: 22px;
        }

        /* Tarefa */
        .card-task{
            background: white;
            border-radius: 10px;
            padding: 14px;
            margin-bottom: 12px;
            box-shadow: 0 3px 8px rgba(0,0,0,0.08);
            cursor: pointer;
            transition: 0.2s;
        }

        .card-task:hover{
            transform: translateY(-2px);
        }

    </style>
</head>

<body>

{% block content %}{% endblock %}

<script>
document.addEventListener('DOMContentLoaded', function() {
    // 1. Lógica para alternar visibilidade da senha (Olhinho)
    const toggleIcons = document.querySelectorAll('.toggle-password');
    
    toggleIcons.forEach(icon => {
        icon.addEventListener('click', function() {
            // Pega o input que está antes do ícone ou no mesmo wrapper
            const input = this.parentElement.querySelector('input');
            
            if (input.type === 'password') {
                input.type = 'text';
                this.classList.remove('fa-eye');
                this.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                this.classList.remove('fa-eye-slash');
                this.classList.add('fa-eye');
            }
        });
    });

    // 2. Sua lógica de limpar erro que já existia
    document.querySelectorAll('.erro-input').forEach(input => {
        input.addEventListener('focus', function() {
            this.classList.remove('erro-input');
        });
    });
});
</script>

</body>
</html>
