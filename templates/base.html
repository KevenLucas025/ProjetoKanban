<!DOCTYPE html>
<html lang="pt-br">
{% load static %}


<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Kanban{% endblock %}</title>

    <style>
        *{
            font-family: Arial, Helvetica, sans-serif;
        }
        body{
            background: linear-gradient(135deg, #0f172a, #1e293b, #334155);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .tela-login{
            background: linear-gradient(135deg, #ffffff, #e5e7eb);
            color: black;
            border-radius: 12px;
            text-align: center;
            padding: 50px;
            width: 500px;
            margin: 130px auto;
            box-shadow:0 20px 50px rgba(0,0,0,0.25);
        }
        .tela-login h1{
            font-size:32px;
            margin-bottom:10px;
            color:#111827;
        }
        .tela-login p{
            color:#6b7280;
            margin-bottom:25px;
        }
        input{
            width: 100%;
            padding:14px;
            margin-bottom:15px;
            border:1px solid #d1d5db;
            border-radius:10px;
            outline:none;
            font-size:15px;
        }
        input:focus{
            border-color: #2563eb;
        }
        button{
            display:block;
            width:70%;
            margin:0 auto;
            padding:14px;
            border:none;
            border-radius:10px;
            background:#2563eb;
            color:white;
            font-size:16px;
            cursor:pointer;
            transition:0.3s;
        }
        button:hover{
            background:#1d4eb8
        }
        a{
            display:block;
            margin-top:18px;
            text-decoration:none;
            color:#2563eb;
            font-size:14px;
        }
        .alerta{
            color:white;
            padding:12px;
            border-radius:8px;
            margin-bottom:15px;
            font-size:14px;
        }

        /* erro */
        .alerta.error{
            background:#ef4444;
        }

        /* sucesso */
        .alerta.success{
            background:#22c55e;
        }
        .erro-input{
            border: 2px solid #ef4444 !important;
            background: #fef2f2;
        }
        .erro-input:focus{
            outline:none;
            border-color:#dc2626;
        }
        .btn-login{
            display: block;
            width: 70%;
            background:#22c55e;
            color:white;
            padding:14px;
            border-radius:10px;
            font-size:14px;
            transition:.3s;
            text-align:center;
            margin:18px auto 0 auto;
        }

        .btn-login:hover{
            background:#16a34a;
        }

    </style>
</head>

<body>

{% block content %}{% endblock %}

<script>
document.querySelectorAll('.erro-input').forEach(input => {

    input.addEventListener('focus', limparErro);
    input.addEventListener('input', limparErro);

    function limparErro(){
        input.classList.remove('erro-input');
    }

});
</script>

</body>
</html>
