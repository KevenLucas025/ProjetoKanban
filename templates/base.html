<!DOCTYPE html>
<html lang="pt-br">
{% load static %}


<head>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.js"></script>
<body>

{% block content %}{% endblock %}

<script>
document.addEventListener('DOMContentLoaded', function() {

    // 1. Olhinho da senha
    const toggleIcons = document.querySelectorAll('.toggle-password');

    toggleIcons.forEach(icon => {
        icon.addEventListener('click', function() {

            const input = this.parentElement.querySelector('input');

            if (input.type === 'password') {
                input.type = 'text';
                this.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                this.classList.replace('fa-eye-slash', 'fa-eye');
            }

        });
    });


    // 2. Limpar erro inputs
    document.querySelectorAll('.erro-input').forEach(input => {
        input.addEventListener('focus', function() {
            this.classList.remove('erro-input');
        });
    });


    // 3. Toast após recarregar página (foto removida)
    if(sessionStorage.getItem("fotoRemovida")){

        sessionStorage.removeItem("fotoRemovida");

        const toast = document.getElementById("toastSucesso");

        if(toast){

            toast.innerHTML = "✅ Foto removida com sucesso";
            toast.style.background = "#22c55e";

            toast.classList.add("show");

            setTimeout(() => {
                toast.classList.remove("show");
            }, 2500);
        }
    }

});


// =======================
// FUNÇÕES GLOBAIS
// =======================

function togleMenu(){

    const menu = document.getElementById("menuPerfil");

    if(menu){
        menu.style.display =
            (menu.style.display === "block") ? "none" : "block";
    }

}

function abrirUpload(){
    document.getElementById("inputFoto").click();
}


// Fechar menu clicando fora
document.addEventListener("click", function(e) {

    const menu = document.getElementById("menuPerfil");

    if(menu && !e.target.closest(".user-menu")){
        menu.style.display = "none";
    }

});


// =======================
// CROPPER FOTO
// =======================

let cropper;

document.getElementById("inputFoto").addEventListener("change", function(e){

    const file = e.target.files[0];

    if(file){

        const reader = new FileReader();

        reader.onload = function(event){

            document.getElementById("imagemCrop").src = event.target.result;

            document.getElementById("modalCrop").style.display = "flex";

            cropper = new Cropper(
                document.getElementById("imagemCrop"),
                {
                    aspectRatio: 1,
                    viewMode: 1,
                    dragMode: "move",

                    ready() {
                        cropper.setCropBoxData({
                            left: 120,
                            top: 140,
                            width: 300,
                            height: 300
                        });
                    }
                }
            );

        };

        reader.readAsDataURL(file);
    }

});


function confirmarCrop(){

    cropper.getCroppedCanvas({
        width: 300,
        height: 300
    }).toBlob(function(blob){

        let formData = new FormData();

        formData.append("foto", blob);

        formData.append(
            "csrfmiddlewaretoken",
            document.querySelector("[name=csrfmiddlewaretoken]").value
        );

        fetch("/upload-foto/", {
            method: "POST",
            body: formData
        })
        .then(() => location.reload());

    });

}


function fecharModalCrop(){

    document.getElementById("modalCrop").style.display = "none";

    if(cropper){
        cropper.destroy();
        cropper = null;
    }

    document.getElementById("inputFoto").value = "";
}



// =======================
// REMOVER FOTO
// =======================

function removerFoto(){

    const avatar = document.querySelector(".user-avatar img");

    // não existe foto
    if(!avatar){

        const toast = document.getElementById("toastSucesso");

        toast.innerHTML = "⚠️ Não há imagem para remover";
        toast.style.background = "#f59e0b";

        toast.classList.add("show");

        setTimeout(() => {
            toast.classList.remove("show");
        }, 2500);

        return;
    }

    // existe foto
    document.getElementById("modalRemover").style.display = "flex";
}


function fecharRemover(){
    document.getElementById("modalRemover").style.display = "none";
}


function confirmarRemover(){

    fetch("/remover-foto/", {
        method: "POST",
        headers: {
            "X-CSRFToken":
                document.querySelector("[name=csrfmiddlewaretoken]").value
        }
    })
    .then(res => res.json())
    .then(data => {

        if(data.status === "ok"){

            fecharRemover();

            sessionStorage.setItem("fotoRemovida", "1");

            location.reload();
        }

    });

}
function sairSistema(){
    document.getElementById("modal-Sair").style.display = "flex";
}
function fecharSair(){
    document.getElementById("modal-Sair").style.display = "none";
}
function confirmarSair(){
    window.location.href = "/logout/";
}

function visualizarFoto(){
    const avatar = document.querySelector(".user-avatar img");

    if(!avatar){
        const toast = document.getElementById("toastSucesso");

        toast.innerHTML = "⚠️ Nenhuma imagem cadastrada";
        toast.style.background = "#f59e0b";

        toast.classList.add("show");

        setTimeout(() => {
            toast.classList.remove("show");
        }, 2500);

        return;
    }

    document.getElementById("imgVisualizar").src = avatar.src;
    document.getElementById("modalVisualizar").style.display = "flex";

}

function fecharVisualizar(){
    document.getElementById("modalVisualizar").style.display = "none";
}

function abrirDados(){
    document.getElementById("modalDados").style.display = "flex";
}

function fecharDados(){
    document.getElementById("modalDados").style.display = "none";
}
document.querySelectorAll(".coluna").forEach(coluna => {

    new Sortable(coluna, {
        group: "kanban",
        animation: 200,
        draggable: ".card-task",
        filter: ".menu-card, .btn-menu-card",
        preventOnFilter: false,

        ghostClass: "sortable-ghost",
        chosenClass: "sortable-chosen",
        dragClass: "sortable-drag",

        forceFallback: true,
        fallbackOnBody: true,
        swapThreshold: 0.65
    });

});
function toggleMenuLista(botao){

    const menu = botao.nextElementSibling;

    document.querySelectorAll(".menu-lista").forEach(item=>{
        if(item !== menu){
            item.style.display = "none";
        }
    });

    menu.style.display =
        menu.style.display === "block"
        ? "none"
        : "block";
}


let colunaSelecionada = null;

function adicionarCard(link){

    colunaSelecionada = link.closest(".coluna");

    document.getElementById("modalNovoCard").style.display = "flex";

    document.getElementById("nomeNovoCard").value = "";

    link.closest(".menu-lista").style.display = "none";
}

function fecharNovoCard(){
    document.getElementById("modalNovoCard").style.display = "none";
}

function salvarNovoCard(){

    const nome = document.getElementById("nomeNovoCard").value.trim();

    if(nome === ""){
        return;
    }

    const csrf =
        document.querySelector("[name=csrfmiddlewaretoken]").value;

    fetch("/card/criar/", {
        method:"POST",
        headers:{
            "Content-Type":"application/json",
            "X-CSRFToken": csrf
        },
        body: JSON.stringify({
            titulo: nome,
            coluna: colunaSelecionada.dataset.coluna
        })
    })
    .then(res => res.json())
    .then(data => {

        const novo = document.createElement("div");

        novo.className = "card-task";
        novo.setAttribute("data-id", data.id);

        novo.innerHTML = `
            <div class="topo-card">

                <span class="titulo-card">${data.titulo}</span>

                <button class="btn-menu-card"
                    onclick="toggleMenuCard(this)">
                    ⋮
                </button>

                <div class="menu-card">

                    <a href="javascript:void(0)"
                       onclick="renomearCard(this)">
                       ✏️ Renomear
                    </a>

                    <a href="javascript:void(0)"
                       onclick="excluirCard(this)">
                       🗑️ Excluir
                    </a>

                </div>

            </div>
        `;

        colunaSelecionada.appendChild(novo);

        atualizarContador(colunaSelecionada.dataset.coluna, 1);

        fecharNovoCard();
    });

}
function toggleMenuCard(botao){

    const menu = botao.nextElementSibling;

    if (menuAberto && menuAberto !== menu){
        menuAberto.style.display = "none";
    }

    if (menu.style.display === "block"){
        menu.style.display = "none";
        menuAberto = null;
    } else {
        menu.style.display = "block";
        menuAberto = menu;
    }
}


function excluirCard(link){

    const card = link.closest(".card-task");
    const cardId = card.getAttribute("data-id");

    const csrf = document.querySelector("[name=csrfmiddlewaretoken]").value;

    fetch(`/card/excluir/${cardId}/`, {
        method: "POST",
        headers: {
            "X-CSRFToken": csrf
        }
    })
    .then(res => res.json())
    .then(data => {

        if (data.status === "ok") {
            const coluna = card.closest(".coluna");

            card.remove();

            atualizarContador(coluna.dataset.coluna, -1);
        }

    });

}


let tituloEditando = null;

function renomearCard(link){

    const card = link.closest(".card-task");

    tituloEditando = card.querySelector(".titulo-card");

    document.getElementById("inputRenomearCard").value =
        tituloEditando.innerText;

    document.getElementById("modalRenomearCard").style.display = "flex";
}
function fecharRenomearCard(){
    document.getElementById("modalRenomearCard").style.display = "none";
}

function salvarRenomearCard(){

    const novoNome = document.getElementById("inputRenomearCard").value.trim();

    if(novoNome === ""){
        return;
    }

    const cardId = tituloEditando.closest(".card-task").getAttribute("data-id");

    const csrf = document.querySelector("[name=csrfmiddlewaretoken]").value;

    fetch(`/card/renomear/${cardId}/`, {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "X-CSRFToken": csrf
        },
        body: JSON.stringify({
            titulo: novoNome
        })
    })
    .then(res => res.json())
    .then(data => {

        if(data.status === "ok"){
            tituloEditando.innerText = novoNome;
            fecharRenomearCard();
        }

    });

}
document.addEventListener("click", function (e) {

    // =========================
    // FECHAR MENU DA COLUNA
    // =========================
    const menusLista = document.querySelectorAll(".menu-lista");

    menusLista.forEach(menu => {

        const botao = menu.previousElementSibling; // ⋮ da coluna

        const clicouDentro = menu.contains(e.target) || botao.contains(e.target);

        if (!clicouDentro) {
            menu.style.display = "none";
        }

    });


    // =========================
    // FECHAR MENU DO CARD
    // =========================
    const menusCard = document.querySelectorAll(".menu-card");

    menusCard.forEach(menu => {

        const botao = menu.previousElementSibling; // ⋮ do card

        const clicouDentro = menu.contains(e.target) || botao.contains(e.target);

        if (!clicouDentro) {
            menu.style.display = "none";
        }

    });

});
let menuAberto = null;

function toggleMenuLista(botao){

    const menu = botao.nextElementSibling;

    // fecha anterior se for diferente
    if (menuAberto && menuAberto !== menu){
        menuAberto.style.display = "none";
    }

    // alterna atual
    if (menu.style.display === "block"){
        menu.style.display = "none";
        menuAberto = null;
    } else {
        menu.style.display = "block";
        menuAberto = menu;
    }
}
function atualizarContador(colunaCodigo, delta) {

    const coluna = document.querySelector(`[data-coluna="${colunaCodigo}"]`);

    if (!coluna) return;

    const span = coluna.querySelector("h2 span");

    if (!span) return;

    let valorAtual = parseInt(span.innerText || "0");

    span.innerText = valorAtual + delta;
}
