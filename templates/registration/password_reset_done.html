{% extends 'base.html' %}

{% block content %}

<div style="text-align:center; margin-top:100px;">
    
    <h2 style="color:green;">Email enviado ✔</h2>

    <p>
        Se existir uma conta com esse email, você vai receber um link para redefinir sua senha.
    </p>

    <p>Você será redirecionado para o login em alguns segundos...</p>

<script>
    setTimeout(function () {
        window.location.href = "{% url 'login' %}";
    }, 3000);
</script>

{% endblock %}
