{% extends 'base.html' %}

{% block content %}
<div class="tela-login">
    <h1>Kanban</h1>
    <p>Entre na sua conta</p>

    {% if messages %}
        <div id="messages-container">
            {% for message in messages %}
                <p class="error-messages" style="color: #ff4d4d; background: #ffe6e6; padding: 10px; border-radius: 5px; margin-bottom: 15px; font-size: 14px; border: 1px solid #ffcccc; animation: shake 0.5s;">
                    {{ message }}
                </p>
            {% endfor %}
        </div>
        {% endif %}

    <form method="POST">
        {% csrf_token %}
        
        <input type="text"
               name="login_user"
               placeholder="Usuário ou Email"
               autocomplete="username">

        <div class="input-wrapper" style="position: relative;">
            <input type="password"
                   name="login_pass"
                   id="id_password"
                   placeholder="Senha"
                   autocomplete="current-password"
                   style="margin-bottom: 0;"> <i class="fa-solid fa-eye toggle-password" 
               style="position: absolute; right: 60px; top: 37%; cursor: pointer; color: #666; font-size: 18px;"></i>
        </div>

        <button type="submit" style="margin-top: 25px;">Entrar</button>
    </form>
    
    <a href="/accounts/password_reset">Esqueci minha senha</a><br>
    <a href="/register/">Não possui conta? Criar agora</a>
</div>

<style>
    @keyframes shake {
        0%, 100% {transform: translateX(0);}
        25% {transform: translateX(-5px);}
        75% {transform: translateX(5px);}
    }

</style>
<script>
    setTimeout(function(){
        const container = document.getElementById("messages-container");

        if (container){
            container.style.transition = "opacity 0.5s ease";
            container.style.opacity = "0";
            setTimeout(() => container.remove(),500);      
        }
    }, 4000);

</script>

{% endblock %}
