{% extends 'base.html' %}

{% block content %}

<div class="tela-login">
    <h1>Kanban</h1>
    <p>Entre na sua conta</p>

    <form method="POST" autocomplete="off">
        {% csrf_token %}
        
        <input type="text"
               name="login_user"
               placeholder="Usuário ou Email"
               autocomplete="off">

        <input type="password"
               name="login_pass"
               placeholder="Senha"
               autocomplete="new-password">

        <button type="submit">Entrar</button>
    </form>
    <a href="/accounts/password_reset">Esqueci minha senha</a><br>
    <a href="/register/">Não possui conta? Criar agora</a>
</div>

{% endblock %}
